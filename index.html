<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Simple Notifier</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Hiragino Kaku Gothic ProN', 'メイリオ', sans-serif;
      background: #f8fafc;
      color: #111827;
      min-height: 100vh;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    .card {
      width: 100%;
      max-width: 640px;
      background: white;
      border-radius: 18px;
      box-shadow: 0 20px 60px rgba(15, 23, 42, 0.12);
      padding: 32px;
    }
    h1 {
      margin: 0 0 18px;
      font-size: 28px;
      line-height: 1.1;
    }
    p {
      margin: 0 0 16px;
      color: #4b5563;
      line-height: 1.7;
    }
    ul {
      margin: 0 0 24px;
      padding-left: 20px;
      color: #374151;
    }
    a {
      color: #2563eb;
      text-decoration: none;
    }
    a:hover {
      text-decoration: underline;
    }
    .buttons {
      display: grid;
      gap: 12px;
    }
    .buttons a {
      display: inline-flex;
      justify-content: center;
      padding: 12px 18px;
      border-radius: 12px;
      background: #2563eb;
      color: white;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Simple Notifier</h1>
    <p>このリポジトリは、予定管理や睡眠記録を含む複数の静的ページを公開できます。iPad などブラウザからのアクセスは、GitHub Pages の静的公開が最も簡単です。</p>
    <ul>
      <li><strong>calendar.html</strong> - 予定管理と通知機能</li>
      <li><strong>daily_activity.html</strong> - 1日の活動円グラフ</li>
      <li><strong>monthly_calendar.html</strong> - 月間活動カレンダー</li>
    </ul>
    <div class="buttons">
      <a href="calendar.html">予定管理ページを開く</a>
      <a href="daily_activity.html">活動円グラフページを開く</a>
      <a href="monthly_calendar.html">月間カレンダーページを開く</a>
    </div>
  </div>
</body>
</html>
